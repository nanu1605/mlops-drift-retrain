# Build the serving image (one image, four entrypoints) and push a multi-arch manifest to GHCR.
# arm64 is what Oracle OKE's Always-Free A1 nodes need; amd64 covers local/compose.
name: image

on:
  push:
    branches: [master, main]
    paths:
      - "src/**"
      - "configs/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - "deploy/docker/serving.Dockerfile"
      - ".github/workflows/image.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/mlops-drift

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to GHCR with the built-in token
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3      # arm64 cross-build
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build + push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/serving.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
