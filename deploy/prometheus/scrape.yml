# Minimal single-target scrape for the local `make up` serving process. The container stacks
# use their own configs: deploy/docker/prometheus.yml (compose) and ServiceMonitors on minikube.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: intrusion-serving
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:8000"]   # local mode; in-cluster use the Service DNS name
