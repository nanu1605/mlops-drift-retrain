apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: mlops
  labels: { app: controller }
spec:
  replicas: 1
  strategy: { type: Recreate }   # retrain writes mlflow.db — exactly one writer
  selector:
    matchLabels: { app: controller }
  template:
    metadata:
      labels: { app: controller }
    spec:
      initContainers:
        # Wait for the seeded champion so the first tick has something to evaluate.
        - name: wait-for-champion
          image: mlops-drift:local
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until python -c "import mlflow; from mlflow.tracking import MlflowClient; \
              mlflow.set_tracking_uri('sqlite:////app/mlflow.db'); \
              MlflowClient().get_model_version_by_alias('intrusion-classifier','champion')" 2>/dev/null; do
                echo "waiting for champion"; sleep 5;
              done
          volumeMounts: [{ name: state, mountPath: /app }]
      containers:
        - name: controller
          image: mlops-drift:local
          imagePullPolicy: IfNotPresent
          command: ["make", "loop"]
          env:
            - { name: SERVING_URL, value: "http://serving:8000" }
          ports:
            - { containerPort: 9100, name: metrics }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }   # retrain runs here, give it headroom
            limits: { cpu: "2", memory: "2Gi" }
          volumeMounts: [{ name: state, mountPath: /app }]
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: mlops-state
---
apiVersion: v1
kind: Service
metadata:
  name: controller
  namespace: mlops
  labels: { app: controller }
spec:
  selector: { app: controller }
  ports:
    - name: metrics     # named port the ServiceMonitor scrapes for drift/realized-F1
      port: 9100
      targetPort: 9100
  type: ClusterIP
